# EzNet Inbound — Thales Transparent LB
# Listens on TCP port 9100 for raw Thales commands from client apps.
# Publishes to ActiveMQ queue consumed by thales-transparent-lb JAR.
# Reply comes back via JMS correlation to the originating EzNet connection.

server.port=8120

# 2-byte length prefix (standard Thales framing)
tcp2jms.tcp.serializer.header-size=2

# Port where client apps connect and send raw Thales commands
tcp2jms.tcp.local.port=9100

# No remote TCP target — this is inbound-only
tcp2jms.tcp.remote.host=
tcp2jms.tcp.remote.port=0

# ActiveMQ
tcp2jms.jms.connection.broker-url=failover:(tcp://127.0.0.1:61616)

# Identity of this adapter instance
tcp2jms.jms.destination.self=hsm-transparent-lb-inbound

# Control queue
tcp2jms.jms.destination.control=xenticate.control

# Outbound (request) goes TO the load balancer
tcp2jms.jms.destination.inbound=hsm.transparent.lb.in

# Inbound (response) comes FROM the load balancer (reply via correlation)
tcp2jms.jms.destination.outbound=hsm.transparent.lb.reply

# Concurrency — tune based on expected TPS to HSM
tcp2jms.jms.listener.inbound-control.max-concurrent-consumers=1
tcp2jms.jms.listener.inbound-request.concurrent-consumers=20
tcp2jms.jms.listener.inbound-request.max-concurrent-consumers=100
tcp2jms.jms.listener.inbound-response.concurrent-consumers=20
tcp2jms.jms.listener.inbound-response.max-concurrent-consumers=100
