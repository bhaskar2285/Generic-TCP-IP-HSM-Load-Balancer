server.port=8110
spring.threads.virtual.enabled=true

# ── ActiveMQ ──────────────────────────────────────────────────────────────────
# initialReconnectDelay: wait 100ms before first retry
# maxReconnectDelay: cap at 10s between retries
# maxReconnectAttempts: -1 = retry forever (failover behaviour)
# queuePrefetch=1: each consumer fetches one message at a time — prevents
#   starvation where one fast consumer hogs all messages
spring.activemq.broker-url=failover:(tcp://127.0.0.1:61616)?jms.prefetchPolicy.queuePrefetch=1&initialReconnectDelay=100&maxReconnectDelay=10000&maxReconnectAttempts=-1&randomize=false
spring.activemq.user=
spring.activemq.password=
spring.jms.pub-sub-domain=false

# ── JMS queue names ───────────────────────────────────────────────────────────
hsm.lb.queue.inbound=hsm.transparent.lb.in
hsm.lb.queue.control=hsm.transparent.lb.control
hsm.lb.queue.reply=hsm.transparent.lb.reply

# ── JMS listener concurrency ──────────────────────────────────────────────────
# Rule of thumb: max-concurrent-consumers >= max_TPS * max_HSM_response_time_sec
# At 10 TPS cap and 8s socket timeout: 10 * 8 = 80 max in-flight.
# Set to 50 min / 100 max — matches eznet's inbound-response concurrency.
hsm.lb.jms.concurrent-consumers=10
hsm.lb.jms.max-concurrent-consumers=50
# Per-node max in-flight: socket-timeout(8s) * TPS-per-node(~10) = 80, capped at 50 for safety
# ConcurrencyManager scales maxConcurrentConsumers = healthyNodes * perNodeCapacity at runtime
hsm.lb.jms.per-node-capacity=15

# ── Load balancing ────────────────────────────────────────────────────────────
# ROUND_ROBIN: best for equal-capacity HSMs — no per-request state, zero overhead
hsm.lb.algorithm=ROUND_ROBIN

# ── Health check ──────────────────────────────────────────────────────────────
# 10s interval: detects a dead node within one interval window.
# Socket timeouts here are capped at 3s so the scheduler thread doesn't block.
hsm.lb.health.interval-ms=10000
hsm.lb.health.command-hex=0008303030304e4f3030

# ── HSM socket settings (per-request, payShield closes after each response) ───
# socket-timeout-ms: max wait for HSM response. payShield typical < 500ms;
#   set to 8000 to cover worst-case crypto operations without blocking too long.
# connect-timeout-ms: TCP connect to HSM. Should be fast on LAN; 3s is generous.
# max-total / min-idle are unused (socket-per-request model) but kept for
#   compatibility with LbProperties PoolConfig binding.
hsm.lb.pool.max-total=1
hsm.lb.pool.min-idle=0
hsm.lb.pool.max-wait-ms=8000
hsm.lb.pool.socket-timeout-ms=8000
hsm.lb.pool.connect-timeout-ms=3000
# Fast-fail per-attempt timeout when alternatives exist (direct HSM LAN latency < 1ms)
hsm.lb.pool.fast-fail-timeout-ms=5

# ── Circuit breaker ───────────────────────────────────────────────────────────
# failure-threshold=3: trip after 3 consecutive errors (faster than default 5)
# reset-ms=20000: try recovery probe after 20s in OPEN state
hsm.lb.circuit-breaker.failure-threshold=3
hsm.lb.circuit-breaker.reset-ms=20000

# ── Retry / failover ─────────────────────────────────────────────────────────
# 2 = try the selected node, then one other node on failure.
# Keep low — retrying slow HSM ops amplifies latency.
hsm.lb.retry.max-attempts=2

# ── Request TTL ───────────────────────────────────────────────────────────────
# Drop JMS messages older than: socket-timeout * max-attempts + 5s buffer = 21s
# Rounded to 25s to give retry some breathing room.
hsm.lb.request.max-age-ms=25000

# ── HSM nodes ─────────────────────────────────────────────────────────────────
hsm.lb.nodes=node1:127.0.0.1:9998:1,node2:127.0.0.1:10001:1,node3:127.0.0.1:10002:1

# ── Instance identity (for multi-server Prometheus) ──────────────────────────
# Defaults to hostname if not set. Set explicitly on each server:
#   hsm.lb.instance-id=lb-1   (server A)
#   hsm.lb.instance-id=lb-2   (server B)
hsm.lb.instance-id=

# ── Adaptive tuning ───────────────────────────────────────────────────────────
# Learns from P99 latency + error rate every 30s to auto-adjust socket timeout,
# circuit breaker threshold, and request TTL.
hsm.lb.adaptive.interval-ms=30000

# ── Payload logging ───────────────────────────────────────────────────────────
# false in production — each request/response hex line can be 100+ bytes.
# Enable only for short debug sessions.
hsm.lb.payload.log-enabled=false

# ── Actuator / Prometheus ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
# INFO in production. Switch to DEBUG only when diagnosing a specific issue.
logging.level.com.isc.hsm.transparentlb=INFO
logging.level.com.isc.hsm.transparentlb.health=INFO
logging.level.org.springframework=WARN
logging.level.org.apache.activemq=WARN

# Log files
logging.file.name=/var/log/xenticate/thales-lb-app.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB
