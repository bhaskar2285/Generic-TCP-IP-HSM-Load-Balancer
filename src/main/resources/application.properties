server.port=8110

# ActiveMQ
spring.activemq.broker-url=failover:(tcp://127.0.0.1:61616)
spring.activemq.user=
spring.activemq.password=
spring.jms.pub-sub-domain=false

# JMS queue names
hsm.lb.queue.inbound=hsm.transparent.lb.in
hsm.lb.queue.control=hsm.transparent.lb.control

# Concurrency for JMS listener
hsm.lb.jms.concurrent-consumers=20
hsm.lb.jms.max-concurrent-consumers=100

# Load balancing algorithm: ROUND_ROBIN | LEAST_CONNECTIONS | WEIGHTED_ROUND_ROBIN | RANDOM
hsm.lb.algorithm=ROUND_ROBIN

# Health check interval (ms)
hsm.lb.health.interval-ms=5000
# NO command hex used for health check
hsm.lb.health.command-hex=0008303030304e4f3030

# Socket pool settings (per node)
hsm.lb.pool.max-total=20
hsm.lb.pool.min-idle=2
hsm.lb.pool.max-wait-ms=3000
hsm.lb.pool.socket-timeout-ms=10000
hsm.lb.pool.connect-timeout-ms=3000

# Thales nodes: id:host:port:weight (comma separated, add as many as needed)
hsm.lb.nodes=node1:127.0.0.1:7004:1

# Payload hex dump logging (true = log every request+response hex to thales-lb-payload.log)
# WARNING: generates large log files at high TPS — enable for debug only
hsm.lb.payload.log.enabled=true

# Logging levels
logging.level.com.isc.hsm.transparentlb=DEBUG
logging.level.com.isc.hsm.transparentlb.health=DEBUG
logging.level.org.springframework=INFO
logging.level.org.apache.activemq=WARN

# Log files (used when logback.xml is NOT specified — fallback)
logging.file.name=/var/log/xenticate/thales-lb-app.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB
