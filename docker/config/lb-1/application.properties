server.port=8110
spring.threads.virtual.enabled=true

spring.activemq.broker-url=failover:(tcp://activemq-1:61616,tcp://activemq-2:61616)?jms.prefetchPolicy.queuePrefetch=1&initialReconnectDelay=100&maxReconnectDelay=10000&maxReconnectAttempts=-1&randomize=false
spring.activemq.user=
spring.activemq.password=
spring.jms.pub-sub-domain=false

hsm.lb.queue.inbound=hsm.transparent.lb.in
hsm.lb.queue.control=hsm.transparent.lb.control
hsm.lb.queue.reply=hsm.transparent.lb.reply

hsm.lb.jms.concurrent-consumers=10
hsm.lb.jms.max-concurrent-consumers=50
hsm.lb.jms.per-node-capacity=15

hsm.lb.algorithm=ROUND_ROBIN

hsm.lb.health.interval-ms=10000
hsm.lb.health.command-hex=0008303030304e4f3030

hsm.lb.pool.max-total=1
hsm.lb.pool.min-idle=0
hsm.lb.pool.max-wait-ms=8000
hsm.lb.pool.socket-timeout-ms=8000
hsm.lb.pool.connect-timeout-ms=3000
hsm.lb.pool.fast-fail-timeout-ms=5

hsm.lb.circuit-breaker.failure-threshold=3
hsm.lb.circuit-breaker.reset-ms=20000

hsm.lb.retry.max-attempts=2
hsm.lb.request.max-age-ms=25000

hsm.lb.nodes=node1:172.18.0.1:9998:1,node2:172.18.0.1:10001:1,node3:172.18.0.1:10002:1

hsm.lb.instance-id=lb-1
hsm.lb.adaptive.interval-ms=30000
hsm.lb.payload.log-enabled=false

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

logging.level.com.isc.hsm.transparentlb=INFO
logging.level.com.isc.hsm.transparentlb.health=DEBUG
logging.level.org.springframework=WARN
logging.level.org.apache.activemq=WARN
logging.file.name=/var/log/xenticate/thales-lb1-app.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB
